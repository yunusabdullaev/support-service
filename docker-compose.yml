version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hippo_support_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hippo
      POSTGRES_PASSWORD: hippo_secret
      POSTGRES_DB: hippo_support
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hippo -d hippo_support']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hippo_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hippo.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
